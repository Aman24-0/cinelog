[build]
  command = "npm run build"
  publish = "dist"

# VITE_ prefixed variables are meant to be public in browser bundles
# Firebase API key is safe to expose (use Firestore rules to protect data)
# TMDB/OMDB/Gemini keys will be rate-limited per IP anyway
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "VITE_FIREBASE_API_KEY,VITE_FIREBASE_AUTH_DOMAIN,VITE_FIREBASE_PROJECT_ID,VITE_FIREBASE_STORAGE_BUCKET,VITE_FIREBASE_MESSAGING_SENDER_ID,VITE_FIREBASE_APP_ID,VITE_GEMINI_API_KEY,VITE_TMDB_API_KEY,VITE_OMDB_API_KEY,VITE_WATCHMODE_KEY"

# Netlify proxy for TMDB API (fixes India ISP DNS block)
[[redirects]]
  from = "/tmdb/*"
  to = "https://api.themoviedb.org/3/:splat"
  status = 200
  force = true

  [[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
